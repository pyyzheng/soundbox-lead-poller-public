name: Deploy Facebook Webhook (Cloudflare)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "facebook-lead-webhook/**"
      - ".github/workflows/deploy-facebook-webhook.yml"

concurrency:
  group: deploy-facebook-webhook
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deploy Worker
        working-directory: facebook-lead-webhook
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
      - name: Smoke test
        run: |
          body=$(curl -fsS https://webhook.soundboxbooth.com/)
          echo "$body"
          echo "$body" | grep -q 'facebook-lead-webhook'
