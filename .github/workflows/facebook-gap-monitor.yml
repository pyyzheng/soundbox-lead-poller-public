name: Facebook Gap Monitor

# Meta leadgen_id ↔ 飞书差集：有漏录则告警并自动触发 Facebook Lead Poller
on:
  schedule:
    # 与 Poller */30 错开，减少并发；每小时一次足够（Poller 已是半小时兜底）
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      check_hours:
        description: "检查最近 N 小时"
        required: false
        default: "6"
      dry_run:
        description: "Dry run（不告警、不触发 Poller）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      auto_trigger:
        description: "发现漏录时自动触发 Poller"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: facebook-gap-monitor
  cancel-in-progress: false

jobs:
  gap-monitor:
    name: Meta ↔ Feishu Gap Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Facebook gap monitor
        env:
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          FEISHU_APP_ID:          ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:      ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN:       ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID:        ${{ secrets.FEISHU_TABLE_ID }}
          FEISHU_ALERT_WEBHOOK:   ${{ secrets.FEISHU_ALERT_WEBHOOK }}
          GITHUB_TOKEN:           ${{ secrets.GHA_PAT }}
          GHA_PAT:                ${{ secrets.GHA_PAT }}
          GITHUB_REPO:            ${{ github.repository }}
          CHECK_HOURS:            ${{ github.event.inputs.check_hours || '6' }}
          DRY_RUN:                ${{ github.event.inputs.dry_run || 'false' }}
          AUTO_TRIGGER_POLLER:    ${{ github.event.inputs.auto_trigger || 'true' }}
        # 有漏录时脚本 exit 1；仍继续以便日志可见，但用注解标红
        run: |
          set +e
          python cloud-facebook-gap-monitor.py
          code=$?
          if [ "$code" -eq 0 ]; then
            echo "gap_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "gap_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Detected Facebook lead gaps (exit=$code); alert/Poller may have been triggered"
          fi
          exit 0
        id: monitor
