name: Daily Lead Report

on:
  schedule:
    - cron: "15 1 * * *"  # UTC 01:15 = 北京时间 09:15
  workflow_dispatch:

jobs:
  report:
    name: Generate Daily Lead Report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run daily report
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN:             ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID:              ${{ secrets.FEISHU_TABLE_ID }}
          FEISHU_FILTER_LOG_TABLE_ID: ${{ secrets.FEISHU_FILTER_LOG_TABLE_ID }}
          FEISHU_REPORT_WEBHOOK: ${{ secrets.FEISHU_REPORT_WEBHOOK }}
        run: python cloud-daily-report.py
