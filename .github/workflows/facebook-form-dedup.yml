name: Facebook Form Dedup

on:
  schedule:
    - cron: "15 */2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: facebook-form-dedup
  cancel-in-progress: false

jobs:
  dedup:
    name: Remove Facebook Form Duplicates
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run Facebook form dedup
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
          FB_FORM_DEDUP_DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python3 cloud-facebook-form-dedup.py
